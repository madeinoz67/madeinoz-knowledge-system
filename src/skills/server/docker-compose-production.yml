# Production Docker Compose for Remote Neo4j Knowledge Graph Deployment
#
# Standalone deployment for servers WITHOUT PAI infrastructure.
# Uses native service names and environment variables.
#
# Services:
#   - neo4j: Graph database backend (Cypher queries)
#   - knowledge-mcp: MCP server for knowledge graph operations
#
# Requirements:
#   - Docker Compose v2.x
#   - At least 4GB RAM available
#   - Ports 7474, 7687, 8000 available
#
# Quick Start:
#   1. Copy this file to your server
#   2. Set environment variables (see below) or create .env file
#   3. Run: docker compose -f docker-compose-production.yml up -d
#
# Environment Variables (configure in .env file or export):
#
# REQUIRED:
#   NEO4J_PASSWORD=your-secure-password     (required - change from default)
#   OPENAI_API_KEY=sk-...                   (required for LLM operations)
#
# DATABASE:
#   DATABASE_TYPE=neo4j                     (neo4j or falkordb, default: neo4j)
#   NEO4J_DATABASE=neo4j                    (default: neo4j)
#
# API KEYS (optional - depends on LLM_PROVIDER):
#   ANTHROPIC_API_KEY=sk-...                (for Anthropic Claude models)
#   GOOGLE_API_KEY=AIza...                  (for Google Gemini models)
#   GROQ_API_KEY=gsk_...                    (for Groq models)
#   VOYAGE_API_KEY=...                      (for Voyage AI embeddings)
#
# LLM CONFIGURATION:
#   LLM_PROVIDER=openai                     (openai, ollama, anthropic, gemini, groq)
#   MODEL_NAME=gpt-4o-mini                  (default: gpt-4o-mini)
#   OPENAI_BASE_URL=https://openrouter.ai/api/v1  (for OpenRouter)
#
# EMBEDDER CONFIGURATION:
#   EMBEDDER_PROVIDER=ollama                (ollama or openai, default: ollama)
#   EMBEDDER_PROVIDER_URL=http://host.containers.internal:11434
#   EMBEDDER_MODEL=mxbai-embed-large        (Ollama model name)
#   EMBEDDER_DIMENSIONS=1024                (must match model, default: 1024)
#
# PERFORMANCE:
#   SEMAPHORE_LIMIT=10                      (concurrent LLM requests, default: 10)
#
# KNOWLEDGE GRAPH:
#   GROUP_ID=main                           (isolates knowledge graphs, default: main)
#
# TELEMETRY:
#   GRAPHITI_TELEMETRY_ENABLED=false       (default: false)
#   NEO4J_TELEMETRY_ENABLED=false          (default: false)
#
# PROMPT CACHING:
#   PROMPT_CACHE_ENABLED=true              (default: true)
#   PROMPT_CACHE_METRICS_ENABLED=true      (default: true)
#   PROMPT_CACHE_TTL=1h                    (5m or 1h, default: 1h)
#   METRICS_PORT=9090                      (Prometheus metrics port, default: 9090)
#   PROMPT_CACHE_LOG_REQUESTS=false        (default: false)
#
# SEARCH BEHAVIOR:
#   GRAPHITI_SEARCH_ALL_GROUPS=false       (search all groups when no group_ids specified)
#
# SERVER:
#   LOG_LEVEL=INFO                         (default: INFO)
#
# Access:
#   - Neo4j Browser: http://localhost:7474 (user: neo4j)
#   - MCP HTTP endpoint: http://localhost:8000/mcp
#   - Health check: http://localhost:8000/health
#
# Data Persistence:
#   - Neo4j data stored in Docker volume: neo4j-data
#   - Neo4j logs stored in Docker volume: neo4j-logs
#
# Security Notes:
#   - Change NEO4J_PASSWORD before deployment
#   - Consider adding TLS for production use
#   - Restrict port access via firewall if exposed to internet

name: knowledge-graph

networks:
  knowledge-net:
    driver: bridge

volumes:
  neo4j-data:
    driver: local
  neo4j-logs:
    driver: local

services:
  # Neo4j Graph Database
  neo4j:
    image: neo4j:latest
    container_name: neo4j
    restart: unless-stopped
    networks:
      - knowledge-net
    ports:
      - "7474:7474"  # Neo4j Browser HTTP
      - "7687:7687"  # Bolt protocol
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-changeme}
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1G
      - NEO4J_server_memory_pagecache_size=512m
      - NEO4J_dbms_usage__report_enabled=false
    healthcheck:
      test: ["CMD", "wget", "-O", "/dev/null", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # Graphiti MCP Server
  knowledge-mcp:
    image: ghcr.io/madeinoz67/madeinoz-knowledge-system:1.4.1
    container_name: knowledge-mcp
    restart: unless-stopped
    networks:
      - knowledge-net
    ports:
      - "8000:8000"  # MCP HTTP endpoint
      - "9090:9090"  # Prometheus metrics
    environment:
      # Database connection (connects to neo4j service)
      - DATABASE_TYPE=neo4j
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-changeme}
      - NEO4J_DATABASE=${NEO4J_DATABASE:-neo4j}
      # FalkorDB connection (only used when DATABASE_TYPE=falkordb)
      - FALKORDB_HOST=${FALKORDB_HOST:-neo4j}
      - FALKORDB_PORT=${FALKORDB_PORT:-6379}
      - FALKORDB_PASSWORD=${FALKORDB_PASSWORD:-}
      # API Keys
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - VOYAGE_API_KEY=${VOYAGE_API_KEY:-}
      # LLM Configuration
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - MODEL_NAME=${MODEL_NAME:-gpt-4o-mini}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      # Embedder Configuration
      - EMBEDDER_PROVIDER=${EMBEDDER_PROVIDER:-ollama}
      - EMBEDDER_PROVIDER_URL=${EMBEDDER_PROVIDER_URL:-http://host.containers.internal:11434}
      - EMBEDDER_MODEL=${EMBEDDER_MODEL:-mxbai-embed-large}
      - EMBEDDER_DIMENSIONS=${EMBEDDER_DIMENSIONS:-1024}
      # Performance Configuration
      - SEMAPHORE_LIMIT=${SEMAPHORE_LIMIT:-10}
      # Knowledge Graph Configuration
      - GROUP_ID=${GROUP_ID:-main}
      # Telemetry
      - GRAPHITI_TELEMETRY_ENABLED=${GRAPHITI_TELEMETRY_ENABLED:-false}
      - NEO4J_TELEMETRY_ENABLED=${NEO4J_TELEMETRY_ENABLED:-false}
      # Prompt Caching Configuration
      - PROMPT_CACHE_ENABLED=${PROMPT_CACHE_ENABLED:-true}
      - PROMPT_CACHE_METRICS_ENABLED=${PROMPT_CACHE_METRICS_ENABLED:-true}
      - PROMPT_CACHE_TTL=${PROMPT_CACHE_TTL:-1h}
      - METRICS_PORT=${METRICS_PORT:-9090}
      - PROMPT_CACHE_LOG_REQUESTS=${PROMPT_CACHE_LOG_REQUESTS:-false}
      # Search All Groups (Neo4j only)
      - GRAPHITI_SEARCH_ALL_GROUPS=${GRAPHITI_SEARCH_ALL_GROUPS:-false}
      # Server settings
      - PORT=8000
      - HOST=0.0.0.0
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "--max-time", "5", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: ["uv", "run", "main.py"]

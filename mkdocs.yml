site_name: Madeinoz Knowledge System (PAI Pack)
site_description: Personal knowledge management system powered by Graphiti knowledge graph
site_author: madeinoz67
site_url: https://madeinoz67.github.io/madeinoz-knowledge-system/

repo_name: madeinoz67/madeinoz-knowledge-system
repo_url: https://github.com/madeinoz67/madeinoz-knowledge-system

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - content.lightbox
  logo: assets/logo.png
  favicon: assets/favicon.ico

nav:
  - Home: index.md
  - Get Started:
    - Overview: getting-started/overview.md
    - Quick Reference: getting-started/quick-reference.md
    - Installation: installation/index.md
    - Requirements: installation/requirements.md
    - Verification: installation/verification.md
    - Remote Deployment: installation/remote-deployment.md
  - LKAP:
    - Overview: lkap/index.md
    - Two-Tier Model: lkap/two-tier-model.md
    - Promotion Workflow: lkap/promotion-workflow.md
    - RAG Concepts: rag/concepts.md
    - RAG Quickstart: rag/quickstart.md
    - RAG Config: rag/configuration.md
    - KG Concepts: kg/concepts.md
    - KG Quickstart: kg/quickstart.md
    - KG Config: kg/configuration.md
  - Guides:
    - Basic Usage: usage/basic-usage.md
    - Advanced Usage: usage/advanced.md
    - Document Search (RAG): rag/quickstart.md
    - Evidence Promotion: lkap/promotion-workflow.md
    - Memory Decay: usage/memory-decay.md
    - Monitoring: usage/monitoring.md
    - Backup & Restore: usage/backup-restore.md
    - OSINT Workflows: guides/osint-workflows.md
  - Reference:
    - CLI: reference/cli.md
    - Configuration: reference/configuration.md
    - Architecture: concepts/architecture.md
    - Observability: reference/observability.md
    - Model Guide: reference/model-guide.md
    - RAG Troubleshooting: rag/troubleshooting.md
    - KG Troubleshooting: kg/troubleshooting.md
    - Common Issues: troubleshooting/common-issues.md
  - About:
    - Acknowledgments: acknowledgments.md
    - Hooks & Integration: concepts/hooks-integration.md
    - Benchmarks: reference/benchmarks.md
    - Developer Notes: reference/developer-notes.md
    - Release Process: reference/releases.md

plugins:
  - search
  - offline
  - glightbox

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - tables
  - attr_list
  - md_in_html

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/madeinoz67/madeinoz-knowledge-system

extra_css:
  - stylesheets/extra.css
